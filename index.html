<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VISION</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <h1 style="text-align: center;">🤖</h1>
    </div>
    <div class="chat-box" id="chatBox">
      <!-- Chat messages will appear here -->
    </div>
    <div class="chat-input">
      <label for="userInput" style="display:none;">Type your message here...</label>
      <input type="text" id="userInput" placeholder="Type your message here..." autocomplete="off">
      <button id="voiceButton" class="voice-button">🎤</button>
      <button id="sendButton" class="idbutton">Send</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.0.1/math.js"></script>
  <script src="app.js"></script>
</body>
</html>
